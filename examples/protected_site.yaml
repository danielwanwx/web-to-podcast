project:
  name: protected-site-demo
  output_dir: output/protected-site-demo

source:
  renderer: playwright
  wait_until: networkidle
  storage_state: ../auth/storage-state.json
  headers:
    Accept-Language: en-US,en;q=0.9
  request_delay_seconds: 0.5
  content_selector: article
  title_selector: h1
  remove_selectors:
    - nav
    - footer
  urls:
    - url: https://example.com/private/article
      title: Private Article
      section: "1. Protected"
      order: 1

translation:
  enabled: true
  provider: ollama
  model: gemma4:31b
  target_language: zh

tts:
  enabled: true
  provider: vibevoice
  voice_sample: ""
  device: mps
  isolate_process: true

output:
  naming: official-title
  audio_format: m4a
  bitrate: 128k
