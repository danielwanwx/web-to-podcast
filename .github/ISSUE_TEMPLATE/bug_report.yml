name: Bug report
description: Report a reproducible problem without sharing restricted content.
title: "[Bug]: "
labels: ["bug"]
body:
  - type: markdown
    attributes:
      value: |
        Do not attach credentials, cookies, Playwright storage-state files,
        voice samples, scraped pages, generated audio, private source content,
        or copyrighted text that cannot be redistributed.
  - type: checkboxes
    id: safety
    attributes:
      label: Safety check
      options:
        - label: I have removed credentials, cookies, storage-state files, private content, voice samples, and generated audio from this report.
          required: true
        - label: I am using sources and voice samples that I am authorized to process.
          required: true
  - type: textarea
    id: summary
    attributes:
      label: Summary
      description: What went wrong?
    validations:
      required: true
  - type: textarea
    id: reproduce
    attributes:
      label: Reproduction
      description: Use generic URLs, redacted config, or local sample files.
      render: shell
    validations:
      required: true
  - type: input
    id: version
    attributes:
      label: Version or commit
    validations:
      required: false
  - type: textarea
    id: environment
    attributes:
      label: Environment
      description: OS, Python version, optional extras installed, and relevant local tools.
    validations:
      required: false
